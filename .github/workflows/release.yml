name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Pre-build: Linux x86_64 fleet-cli probe (bundled into every app package) ─
  # Built once, shared across all platform builds so each bundle can SCP the
  # correct Linux binary to remote servers without needing internet on the remote.
  linux-x64-probe:
    name: Build Linux x86_64 probe binary
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          sed -i "s/^version = \".*\"/version = \"${VERSION}\"/" src-tauri/Cargo.toml

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            libglib2.0-dev \
            libgtk-3-dev \
            libssl-dev \
            libayatana-appindicator3-dev

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Setup Zig
        uses: goto-bus-stop/setup-zig@v2

      - name: Install cargo-zigbuild
        run: cargo install cargo-zigbuild

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Build fleet-cli for Linux x86_64
        run: |
          cargo zigbuild --release --bin fleet-cli \
            --manifest-path src-tauri/Cargo.toml \
            --target x86_64-unknown-linux-gnu.2.17
          cp src-tauri/target/x86_64-unknown-linux-gnu/release/fleet-cli /tmp/fleet-linux-x64

      - name: Upload probe binary
        uses: actions/upload-artifact@v4
        with:
          name: fleet-linux-x64-probe
          path: /tmp/fleet-linux-x64

  linux-arm64-probe:
    name: Build Linux ARM64 probe binary
    runs-on: ubuntu-22.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          sed -i "s/^version = \".*\"/version = \"${VERSION}\"/" src-tauri/Cargo.toml

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            libglib2.0-dev \
            libgtk-3-dev \
            libssl-dev \
            libayatana-appindicator3-dev

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu

      - name: Setup Zig
        uses: goto-bus-stop/setup-zig@v2

      - name: Install cargo-zigbuild
        run: cargo install cargo-zigbuild

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Build fleet-cli for Linux ARM64
        run: |
          cargo zigbuild --release --bin fleet-cli \
            --manifest-path src-tauri/Cargo.toml \
            --target aarch64-unknown-linux-gnu.2.17
          cp src-tauri/target/aarch64-unknown-linux-gnu/release/fleet-cli /tmp/fleet-linux-arm64

      - name: Upload probe binary
        uses: actions/upload-artifact@v4
        with:
          name: fleet-linux-arm64-probe
          path: /tmp/fleet-linux-arm64

  # ── Build all platforms (macOS: sign only, notarization handled separately) ─
  build:
    needs: [linux-x64-probe, linux-arm64-probe]
    name: Build — ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS (Apple Silicon)
            runner: macos-latest
            rust_target: aarch64-apple-darwin
            args: --target aarch64-apple-darwin --features gui,tts
            fleet_bin: fleet-cli
            fixed_suffix: macos-arm64

          - name: macOS (Intel)
            runner: macos-15-intel
            rust_target: x86_64-apple-darwin
            args: --target x86_64-apple-darwin --features gui,tts
            fleet_bin: fleet-cli
            fixed_suffix: macos-x64

          - name: Windows (x64)
            runner: windows-latest
            rust_target: x86_64-pc-windows-msvc
            args: --target x86_64-pc-windows-msvc --features gui,tts
            fleet_bin: fleet-cli.exe
            fixed_suffix: windows-x64

          - name: Windows (ARM64)
            runner: windows-latest
            rust_target: aarch64-pc-windows-msvc
            args: --target aarch64-pc-windows-msvc --features gui,tts
            fleet_bin: fleet-cli.exe
            fixed_suffix: windows-arm64

          - name: Linux (x86_64)
            runner: ubuntu-22.04
            rust_target: x86_64-unknown-linux-gnu
            args: --target x86_64-unknown-linux-gnu --features gui,tts
            fleet_bin: fleet-cli
            fixed_suffix: linux-x64

          - name: Linux (ARM64)
            runner: ubuntu-22.04-arm
            rust_target: aarch64-unknown-linux-gnu
            args: --target aarch64-unknown-linux-gnu --features gui,tts
            fleet_bin: fleet-cli
            fixed_suffix: linux-arm64

    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set version from tag
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          sed -i.bak "s/^version = \".*\"/version = \"${VERSION}\"/" src-tauri/Cargo.toml
          rm -f src-tauri/Cargo.toml.bak

      - name: Download Linux x64 probe
        uses: actions/download-artifact@v4
        with:
          name: fleet-linux-x64-probe
          path: src-tauri/resources

      - name: Download Linux arm64 probe
        uses: actions/download-artifact@v4
        with:
          name: fleet-linux-arm64-probe
          path: src-tauri/resources

      - name: Mark probe binaries executable
        shell: bash
        run: chmod +x src-tauri/resources/fleet-linux-x64 src-tauri/resources/fleet-linux-arm64

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            patchelf \
            libglib2.0-dev \
            libgtk-3-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            libasound2-dev \
            xdg-utils

      # ── Pre-build fleet CLI sidecar ─────────────────────────────────────────
      # Must run before tauri-action so the real binary exists in binaries/ and
      # overwrites the build.rs placeholder. tauri-action then signs + bundles it.
      - name: Build fleet CLI sidecar
        shell: bash
        run: |
          # Build the CLI binary (named fleet-cli to avoid collision with tauri externalBin "fleet")
          cargo build --release --bin fleet-cli \
            --manifest-path src-tauri/Cargo.toml \
            --target ${{ matrix.rust_target }}
          mkdir -p src-tauri/binaries

          EXT=""
          if [ "$RUNNER_OS" = "Windows" ]; then EXT=".exe"; fi

          # Copy as fleet-{triple} — tauri externalBin strips the triple and bundles it as "fleet"
          cp "src-tauri/target/${{ matrix.rust_target }}/release/${{ matrix.fleet_bin }}" \
             "src-tauri/binaries/fleet-${{ matrix.rust_target }}${EXT}"

          # Linux: deb.files needs a generic "fleet-linux" name (same binary, generic path)
          if [ "$RUNNER_OS" = "Linux" ]; then
            cp "src-tauri/target/${{ matrix.rust_target }}/release/fleet-cli" \
               "src-tauri/binaries/fleet-linux"
            chmod +x "src-tauri/binaries/fleet-linux"
          fi

          if [ "$RUNNER_OS" != "Windows" ]; then
            chmod +x "src-tauri/binaries/fleet-${{ matrix.rust_target }}"
          fi

      # Sign on macOS — APPLE_ID/PASSWORD/TEAM_ID intentionally omitted
      # so Tauri skips notarization (handled by notarize.yml)
      - name: Import macOS signing certificates
        if: runner.os == 'macOS'
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PWD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
          MACOS_INSTALLER_CERTIFICATE: ${{ secrets.MACOS_INSTALLER_CERTIFICATE }}
          MACOS_INSTALLER_CERTIFICATE_PWD: ${{ secrets.MACOS_INSTALLER_CERTIFICATE_PWD }}
          MACOS_KEYCHAIN_PASSWORD: ${{ secrets.MACOS_KEYCHAIN_PASSWORD }}
        run: |
          if [ -z "$MACOS_CERTIFICATE" ]; then
            echo "MACOS_CERTIFICATE not set — skipping"
            exit 0
          fi
          echo "$MACOS_CERTIFICATE" | base64 --decode > certificate.p12
          security create-keychain -p "$MACOS_KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$MACOS_KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -lut 7200 build.keychain
          security import certificate.p12 -k build.keychain \
            -P "$MACOS_CERTIFICATE_PWD" -T /usr/bin/codesign -T /usr/bin/productbuild -T /usr/bin/pkgbuild
          rm certificate.p12
          # Import installer certificate (for PKG signing)
          if [ -n "$MACOS_INSTALLER_CERTIFICATE" ]; then
            echo "$MACOS_INSTALLER_CERTIFICATE" | base64 --decode > installer.p12
            security import installer.p12 -k build.keychain \
              -P "$MACOS_INSTALLER_CERTIFICATE_PWD" -T /usr/bin/codesign -T /usr/bin/productbuild -T /usr/bin/pkgbuild
            rm installer.p12
          fi
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign:,productbuild: -s -k "$MACOS_KEYCHAIN_PASSWORD" build.keychain

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ''
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          # Static-link OpenSSL so signed macOS app doesn't depend on Homebrew dylibs
          # (macOS rejects dylibs with different Team IDs)
          OPENSSL_STATIC: '1'
        with:
          args: ${{ matrix.args }}
          includeUpdaterJson: false

      # ── Re-sign app with sandbox entitlements + rebuild DMG + build PKG ──
      - name: Re-sign and repackage (macOS)
        if: runner.os == 'macOS'
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_INSTALLER_IDENTITY: ${{ secrets.APPLE_INSTALLER_IDENTITY }}
        shell: bash
        run: |
          APP="src-tauri/target/${{ matrix.rust_target }}/release/bundle/macos/Claw Fleet.app"
          VERSION="${GITHUB_REF_NAME#v}"

          if [ -n "$APPLE_SIGNING_IDENTITY" ]; then
            echo "Re-signing app with sandbox entitlements..."
            codesign --force --deep --sign "$APPLE_SIGNING_IDENTITY" \
              --entitlements src-tauri/entitlements.plist \
              --options runtime \
              "$APP"
          fi

          # Build PKG installer
          PKG_DIR="src-tauri/target/${{ matrix.rust_target }}/release/bundle/pkg"
          mkdir -p "$PKG_DIR"
          PKG_SIGN_ARGS=()
          if [ -n "${APPLE_INSTALLER_IDENTITY:-}" ]; then
            PKG_SIGN_ARGS=(--sign "$APPLE_INSTALLER_IDENTITY")
          fi
          pkgbuild --component "$APP" \
            --identifier "com.hoveychen.claw-fleet" \
            --version "$VERSION" \
            --install-location "/Applications" \
            "${PKG_SIGN_ARGS[@]}" \
            "$PKG_DIR/claw-fleet-${{ matrix.fixed_suffix }}.pkg"

      # ── Collect artifacts ───────────────────────────────────────────────────

      - name: Collect artifacts (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          mkdir -p dist-artifacts
          # PKG installer
          cp src-tauri/target/${{ matrix.rust_target }}/release/bundle/pkg/claw-fleet-${{ matrix.fixed_suffix }}.pkg \
             dist-artifacts/
          # Standalone fleet binary
          cp src-tauri/target/${{ matrix.rust_target }}/release/fleet-cli \
             dist-artifacts/fleet-${{ matrix.fixed_suffix }}

      - name: Collect artifacts (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          mkdir -p dist-artifacts
          # App installer (NSIS) — rename to fixed filename
          find src-tauri/target/${{ matrix.rust_target }}/release/bundle/nsis \
            -name "*.exe" | head -1 | xargs -I{} cp {} dist-artifacts/claw-fleet-${{ matrix.fixed_suffix }}-setup.exe
          # Standalone fleet binary
          cp src-tauri/target/${{ matrix.rust_target }}/release/fleet-cli.exe \
             dist-artifacts/fleet-${{ matrix.fixed_suffix }}.exe

      - name: Collect artifacts (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          mkdir -p dist-artifacts
          # .deb — rename to fixed filename
          find src-tauri/target/${{ matrix.rust_target }}/release/bundle/deb \
            -name "*.deb" | head -1 | xargs -I{} cp {} dist-artifacts/claw-fleet-${{ matrix.fixed_suffix }}.deb 2>/dev/null || true
          # AppImage — rename to fixed filename
          find src-tauri/target/${{ matrix.rust_target }}/release/bundle/appimage \
            -name "*.AppImage" | head -1 | xargs -I{} cp {} dist-artifacts/claw-fleet-${{ matrix.fixed_suffix }}.AppImage 2>/dev/null || true
          # Standalone fleet binary
          cp src-tauri/target/${{ matrix.rust_target }}/release/fleet-cli \
             dist-artifacts/fleet-${{ matrix.fixed_suffix }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.rust_target }}
          path: dist-artifacts/
          if-no-files-found: error

  # ── Publish release with all artifacts ─────────────────────────────────────
  publish:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: all-artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -lh all-artifacts/

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Find latest mobile release
        id: mobile
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          MOBILE_TAG=$(gh release list -L 50 --json tagName -q '[.[] | select(.tagName | startswith("mobile-v"))][0].tagName' 2>/dev/null || echo "")
          if [ -n "$MOBILE_TAG" ]; then
            ASSET_URL=$(gh release view "$MOBILE_TAG" --json assets -q '.assets[0].browserDownloadUrl' 2>/dev/null || echo "")
            echo "tag=$MOBILE_TAG" >> "$GITHUB_OUTPUT"
            echo "url=$ASSET_URL" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate release notes
        run: |
          DL="https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}"
          cat >> release_notes.md << EOF
          ## Downloads

          ### App Installers

          | | Platform | Architecture | Download |
          |---|---|---|---|
          | <img src="https://raw.githubusercontent.com/hoveychen/claw-fleet/main/docs/icon-apple.svg" width="24"> | macOS | Apple Silicon (M1/M2/M3/M4) | [claw-fleet-macos-arm64.pkg](${DL}/claw-fleet-macos-arm64.pkg) |
          | <img src="https://raw.githubusercontent.com/hoveychen/claw-fleet/main/docs/icon-apple.svg" width="24"> | macOS | Intel | [claw-fleet-macos-x64.pkg](${DL}/claw-fleet-macos-x64.pkg) |
          | <img src="https://raw.githubusercontent.com/hoveychen/claw-fleet/main/docs/icon-windows.svg" width="24"> | Windows | x64 | [claw-fleet-windows-x64-setup.exe](${DL}/claw-fleet-windows-x64-setup.exe) |
          | <img src="https://raw.githubusercontent.com/hoveychen/claw-fleet/main/docs/icon-windows.svg" width="24"> | Windows | ARM64 | [claw-fleet-windows-arm64-setup.exe](${DL}/claw-fleet-windows-arm64-setup.exe) |
          | <img src="https://raw.githubusercontent.com/hoveychen/claw-fleet/main/docs/icon-linux.svg" width="24"> | Linux | x86_64 | [claw-fleet-linux-x64.deb](${DL}/claw-fleet-linux-x64.deb) / [claw-fleet-linux-x64.AppImage](${DL}/claw-fleet-linux-x64.AppImage) |
          | <img src="https://raw.githubusercontent.com/hoveychen/claw-fleet/main/docs/icon-linux.svg" width="24"> | Linux | ARM64 | [claw-fleet-linux-arm64.deb](${DL}/claw-fleet-linux-arm64.deb) / [claw-fleet-linux-arm64.AppImage](${DL}/claw-fleet-linux-arm64.AppImage) |

          ### Mobile Companion

          | | Platform | Download |
          |---|---|---|
          | <img src="https://raw.githubusercontent.com/hoveychen/claw-fleet/main/docs/icon-android.svg" width="24"> | Android | [Download APK](${{ steps.mobile.outputs.url }}) |

          Scan the QR code in Desktop → Settings → Mobile to connect.

          ## What's Changed

          See [CHANGELOG](https://github.com/${{ github.repository }}/commits/${{ github.ref_name }}) for full commit history.
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Claw Fleet v${{ steps.version.outputs.version }}
          body_path: release_notes.md
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: all-artifacts/*
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
