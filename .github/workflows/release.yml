name: Release

# Triggered by a successful CI run on a tag push. CI is the single source of
# truth for compiled artifacts; this workflow only signs (macOS) and publishes
# them.
on:
  workflow_run:
    workflows: [CI]
    types: [completed]

  workflow_dispatch:
    inputs:
      run_id:
        description: 'CI run ID to publish from'
        required: true
        type: string
      tag:
        description: 'Tag to release (e.g. v0.1.2)'
        required: true
        type: string

jobs:
  # ═══════════════════════════════════════════════════════════════════════════
  # Resolve which CI run to consume + the tag we are publishing.
  # ═══════════════════════════════════════════════════════════════════════════
  resolve:
    name: Resolve tag
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.event == 'push' &&
       startsWith(github.event.workflow_run.head_branch, 'v'))
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
      version: ${{ steps.tag.outputs.version }}
      run_id: ${{ steps.tag.outputs.run_id }}
    steps:
      - id: tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
            RUN_ID="${{ inputs.run_id }}"
          else
            TAG="${{ github.event.workflow_run.head_branch }}"
            RUN_ID="${{ github.event.workflow_run.id }}"
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"
          echo "run_id=${RUN_ID}" >> "$GITHUB_OUTPUT"

  # ═══════════════════════════════════════════════════════════════════════════
  # Sign + repackage macOS .app → .pkg
  # ═══════════════════════════════════════════════════════════════════════════
  sign-macos:
    name: Sign macOS bundle
    needs: resolve
    runs-on: macos-latest
    permissions:
      actions: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve.outputs.tag }}

      - name: Download unsigned macOS .app
        uses: actions/download-artifact@v4
        with:
          name: desktop-macos-unsigned
          path: incoming
          run-id: ${{ needs.resolve.outputs.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract .app
        shell: bash
        run: |
          mkdir -p extracted
          tar -xzf "incoming/claw-fleet-macos.app.tar.gz" -C extracted

      - name: Import macOS signing certificates
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PWD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
          MACOS_INSTALLER_CERTIFICATE: ${{ secrets.MACOS_INSTALLER_CERTIFICATE }}
          MACOS_INSTALLER_CERTIFICATE_PWD: ${{ secrets.MACOS_INSTALLER_CERTIFICATE_PWD }}
          MACOS_KEYCHAIN_PASSWORD: ${{ secrets.MACOS_KEYCHAIN_PASSWORD }}
        run: |
          if [ -z "$MACOS_CERTIFICATE" ]; then
            echo "MACOS_CERTIFICATE not set — cannot sign"
            exit 1
          fi
          echo "$MACOS_CERTIFICATE" | base64 --decode > certificate.p12
          security create-keychain -p "$MACOS_KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$MACOS_KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -lut 7200 build.keychain
          security import certificate.p12 -k build.keychain \
            -P "$MACOS_CERTIFICATE_PWD" -T /usr/bin/codesign -T /usr/bin/productbuild -T /usr/bin/pkgbuild
          rm certificate.p12
          if [ -n "$MACOS_INSTALLER_CERTIFICATE" ]; then
            echo "$MACOS_INSTALLER_CERTIFICATE" | base64 --decode > installer.p12
            security import installer.p12 -k build.keychain \
              -P "$MACOS_INSTALLER_CERTIFICATE_PWD" -T /usr/bin/codesign -T /usr/bin/productbuild -T /usr/bin/pkgbuild
            rm installer.p12
          fi
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign:,productbuild: -s -k "$MACOS_KEYCHAIN_PASSWORD" build.keychain

      - name: Sign .app and build pkg
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_INSTALLER_IDENTITY: ${{ secrets.APPLE_INSTALLER_IDENTITY }}
          VERSION: ${{ needs.resolve.outputs.version }}
        shell: bash
        run: |
          APP="extracted/Claw Fleet.app"

          if [ -n "$APPLE_SIGNING_IDENTITY" ]; then
            echo "Signing sidecar (fleet CLI) with non-sandbox entitlements..."
            codesign --force --sign "$APPLE_SIGNING_IDENTITY" \
              --entitlements claw-fleet-desktop/entitlements-sidecar.plist \
              --options runtime \
              "$APP/Contents/MacOS/fleet"
            echo "Signing app bundle with sandbox entitlements..."
            codesign --force --sign "$APPLE_SIGNING_IDENTITY" \
              --entitlements claw-fleet-desktop/entitlements.plist \
              --options runtime \
              "$APP"
          fi

          mkdir -p out
          PKG_SIGN_ARGS=()
          if [ -n "${APPLE_INSTALLER_IDENTITY:-}" ]; then
            PKG_SIGN_ARGS=(--sign "$APPLE_INSTALLER_IDENTITY")
          fi
          pkgbuild --component "$APP" \
            --identifier "com.hoveychen.claw-fleet" \
            --version "$VERSION" \
            --install-location "/Applications" \
            "${PKG_SIGN_ARGS[@]}" \
            "out/claw-fleet-macos.pkg"

      - name: Upload signed pkg
        uses: actions/upload-artifact@v4
        with:
          name: release-macos-signed
          path: out/
          if-no-files-found: error

  # ═══════════════════════════════════════════════════════════════════════════
  # Publish release with all artifacts (CLI binaries + Win/Linux bundles from
  # CI + signed macOS pkg from sign-macos).
  # ═══════════════════════════════════════════════════════════════════════════
  publish:
    name: Publish Release
    needs: [resolve, sign-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve.outputs.tag }}

      - name: Download CLI artifacts (from CI run)
        uses: actions/download-artifact@v4
        with:
          pattern: 'fleet-*'
          path: all-artifacts
          merge-multiple: true
          run-id: ${{ needs.resolve.outputs.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download Windows desktop artifact (from CI run)
        uses: actions/download-artifact@v4
        with:
          name: desktop-windows-x64
          path: all-artifacts
          run-id: ${{ needs.resolve.outputs.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download Linux desktop artifact (from CI run)
        uses: actions/download-artifact@v4
        with:
          name: desktop-linux-x64
          path: all-artifacts
          run-id: ${{ needs.resolve.outputs.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download signed macOS pkg
        uses: actions/download-artifact@v4
        with:
          name: release-macos-signed
          path: all-artifacts

      - name: List artifacts
        run: ls -lh all-artifacts/

      - name: Find latest mobile release
        id: mobile
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          MOBILE_TAG=$(gh release list -L 50 --json tagName -q '[.[] | select(.tagName | startswith("mobile-v"))][0].tagName' 2>/dev/null || echo "")
          if [ -n "$MOBILE_TAG" ]; then
            ASSET_URL=$(gh release view "$MOBILE_TAG" --json assets -q '.assets[0].url' 2>/dev/null || echo "")
            echo "tag=$MOBILE_TAG" >> "$GITHUB_OUTPUT"
            echo "url=$ASSET_URL" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate release notes
        env:
          TAG: ${{ needs.resolve.outputs.tag }}
        run: |
          DL="https://github.com/${{ github.repository }}/releases/download/${TAG}"
          cat >> release_notes.md << EOF
          ## Downloads

          ### App Installers

          | | Platform | Architecture | Download |
          |---|---|---|---|
          | <img src="https://raw.githubusercontent.com/hoveychen/claw-fleet/main/docs/icon-apple.svg" width="24"> | macOS | Universal (Intel + Apple Silicon) | [claw-fleet-macos.pkg](${DL}/claw-fleet-macos.pkg) |
          | <img src="https://raw.githubusercontent.com/hoveychen/claw-fleet/main/docs/icon-windows.svg" width="24"> | Windows | x64 / ARM64 | [claw-fleet-windows-x64-setup.exe](${DL}/claw-fleet-windows-x64-setup.exe) |
          | <img src="https://raw.githubusercontent.com/hoveychen/claw-fleet/main/docs/icon-linux.svg" width="24"> | Linux | x86_64 | [claw-fleet-linux-x64.deb](${DL}/claw-fleet-linux-x64.deb) / [claw-fleet-linux-x64.AppImage](${DL}/claw-fleet-linux-x64.AppImage) |

          ### Standalone CLI

          | | Platform | Download |
          |---|---|---|
          | <img src="https://raw.githubusercontent.com/hoveychen/claw-fleet/main/docs/icon-apple.svg" width="24"> | macOS (Universal) | [fleet-macos](${DL}/fleet-macos) |
          | <img src="https://raw.githubusercontent.com/hoveychen/claw-fleet/main/docs/icon-windows.svg" width="24"> | Windows x64 | [fleet-windows-x64.exe](${DL}/fleet-windows-x64.exe) |
          | <img src="https://raw.githubusercontent.com/hoveychen/claw-fleet/main/docs/icon-linux.svg" width="24"> | Linux x86_64 | [fleet-linux-x64](${DL}/fleet-linux-x64) |
          | <img src="https://raw.githubusercontent.com/hoveychen/claw-fleet/main/docs/icon-linux.svg" width="24"> | Linux ARM64 | [fleet-linux-arm64](${DL}/fleet-linux-arm64) |

          ### Mobile Companion

          | | Platform | Download |
          |---|---|---|
          | <img src="https://raw.githubusercontent.com/hoveychen/claw-fleet/main/docs/icon-android.svg" width="24"> | Android | [Download APK](${{ steps.mobile.outputs.url }}) |

          Scan the QR code in Desktop → Settings → Mobile to connect.

          ## What's Changed

          See [CHANGELOG](https://github.com/${{ github.repository }}/commits/${TAG}) for full commit history.
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.resolve.outputs.tag }}
          name: Claw Fleet v${{ needs.resolve.outputs.version }}
          body_path: release_notes.md
          draft: false
          prerelease: ${{ contains(needs.resolve.outputs.tag, '-') }}
          files: all-artifacts/*
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
