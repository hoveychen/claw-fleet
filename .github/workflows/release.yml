name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── 1. Build all platforms (macOS: sign only, no notarize) ──────────────────
  build:
    name: Build — ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # ── macOS Apple Silicon ──────────────────────────────────────────
          - name: macOS (Apple Silicon)
            runner: macos-latest
            rust_target: aarch64-apple-darwin
            args: --target aarch64-apple-darwin

          # ── macOS Intel ──────────────────────────────────────────────────
          - name: macOS (Intel)
            runner: macos-latest
            rust_target: x86_64-apple-darwin
            args: --target x86_64-apple-darwin

          # ── Windows x64 ──────────────────────────────────────────────────
          - name: Windows (x64)
            runner: windows-latest
            rust_target: x86_64-pc-windows-msvc
            args: --target x86_64-pc-windows-msvc

          # ── Windows ARM64 ────────────────────────────────────────────────
          - name: Windows (ARM64)
            runner: windows-latest
            rust_target: aarch64-pc-windows-msvc
            args: --target aarch64-pc-windows-msvc

          # ── Linux x86_64 ─────────────────────────────────────────────────
          - name: Linux (x86_64)
            runner: ubuntu-22.04
            rust_target: x86_64-unknown-linux-gnu
            args: --target x86_64-unknown-linux-gnu

          # ── Linux ARM64 ──────────────────────────────────────────────────
          - name: Linux (ARM64)
            runner: ubuntu-22.04-arm
            rust_target: aarch64-unknown-linux-gnu
            args: --target aarch64-unknown-linux-gnu

    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # ── Linux system dependencies ──────────────────────────────────────────
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            patchelf \
            libglib2.0-dev \
            libgtk-3-dev \
            libssl-dev \
            libayatana-appindicator3-dev

      # ── macOS: import signing certificate (no notarization here) ───────────
      - name: Import macOS signing certificate
        if: runner.os == 'macOS'
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PWD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
          MACOS_KEYCHAIN_PASSWORD: ${{ secrets.MACOS_KEYCHAIN_PASSWORD }}
        run: |
          if [ -z "$MACOS_CERTIFICATE" ]; then
            echo "MACOS_CERTIFICATE not set — skipping"
            exit 0
          fi
          echo "$MACOS_CERTIFICATE" | base64 --decode > certificate.p12
          security create-keychain -p "$MACOS_KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$MACOS_KEYCHAIN_PASSWORD" build.keychain
          security import certificate.p12 -k build.keychain \
            -P "$MACOS_CERTIFICATE_PWD" -T /usr/bin/codesign
          security set-key-partition-list \
            -S apple-tool:,apple: -s -k "$MACOS_KEYCHAIN_PASSWORD" build.keychain
          rm certificate.p12

      - name: Install frontend dependencies
        run: npm ci

      # Sign on macOS, but intentionally omit APPLE_ID/APPLE_PASSWORD/APPLE_TEAM_ID
      # so Tauri does NOT notarize here — notarization happens in its own job.
      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ''
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        with:
          args: ${{ matrix.args }}
          includeUpdaterJson: false

      # ── Collect artifacts ──────────────────────────────────────────────────
      - name: Collect artifacts (macOS DMG)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          mkdir -p dist-artifacts
          find src-tauri/target/${{ matrix.rust_target }}/release/bundle/dmg \
            -name "*.dmg" -exec cp {} dist-artifacts/ \;

      - name: Collect artifacts (Windows NSIS)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          mkdir -p dist-artifacts
          find src-tauri/target/${{ matrix.rust_target }}/release/bundle/nsis \
            -name "*.exe" -exec cp {} dist-artifacts/ \;

      - name: Collect artifacts (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          mkdir -p dist-artifacts
          find src-tauri/target/${{ matrix.rust_target }}/release/bundle/deb \
            -name "*.deb" -exec cp {} dist-artifacts/ \; 2>/dev/null || true
          find src-tauri/target/${{ matrix.rust_target }}/release/bundle/appimage \
            -name "*.AppImage" -exec cp {} dist-artifacts/ \; 2>/dev/null || true

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.rust_target }}
          path: dist-artifacts/
          if-no-files-found: error

  # ── 2. Notarize macOS DMGs (separate job so Apple's queue doesn't block build)
  notarize:
    name: Notarize — ${{ matrix.name }}
    needs: build
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS (Apple Silicon)
            rust_target: aarch64-apple-darwin
          - name: macOS (Intel)
            rust_target: x86_64-apple-darwin

    steps:
      - name: Download signed DMG
        uses: actions/download-artifact@v4
        with:
          name: release-${{ matrix.rust_target }}
          path: dmg-signed/

      - name: Notarize and staple
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          mkdir -p dmg-notarized
          for dmg in dmg-signed/*.dmg; do
            echo "Submitting $dmg for notarization..."
            xcrun notarytool submit "$dmg" \
              --apple-id "$APPLE_ID" \
              --password "$APPLE_PASSWORD" \
              --team-id "$APPLE_TEAM_ID" \
              --wait
            echo "Stapling $dmg..."
            xcrun stapler staple "$dmg"
            cp "$dmg" dmg-notarized/
          done

      - name: Upload notarized DMG
        uses: actions/upload-artifact@v4
        with:
          name: notarized-${{ matrix.rust_target }}
          path: dmg-notarized/
          if-no-files-found: error

  # ── 3. Publish: wait for both build (non-macOS) and notarize (macOS) ────────
  publish:
    name: Publish Release
    needs: [build, notarize]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Download notarized macOS DMGs
      - name: Download notarized macOS artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: notarized-*
          path: all-artifacts
          merge-multiple: true

      # Download Windows artifacts
      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*windows*
          path: all-artifacts
          merge-multiple: true

      # Download Linux artifacts
      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*linux*
          path: all-artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -lh all-artifacts/

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Generate release notes
        run: |
          cat >> release_notes.md << 'EOF'
          ## Downloads

          | Platform | Architecture | File |
          |---|---|---|
          | macOS | Apple Silicon (M1/M2/M3/M4) | `*_aarch64.dmg` |
          | macOS | Intel | `*_x64.dmg` |
          | Windows | x64 | `*_x64-setup.exe` |
          | Windows | ARM64 | `*_arm64-setup.exe` |
          | Linux | x86_64 | `*.deb` / `*.AppImage` |
          | Linux | ARM64 | `*.deb` / `*.AppImage` |

          ## What's Changed

          See [CHANGELOG](https://github.com/${{ github.repository }}/commits/${{ github.ref_name }}) for full commit history.
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Claude Fleet v${{ steps.version.outputs.version }}
          body_path: release_notes.md
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: all-artifacts/*
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
