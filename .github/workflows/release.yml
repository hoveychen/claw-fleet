name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ═══════════════════════════════════════════════════════════════════════════
  # Step 1 — Build fleet-cli for all platforms
  # ═══════════════════════════════════════════════════════════════════════════
  cli-build:
    name: CLI — ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x64
            runner: ubuntu-22.04
            rust_target: x86_64-unknown-linux-gnu
            zigbuild: true
            artifact: fleet-linux-x64

          - name: Linux ARM64
            runner: ubuntu-22.04-arm
            rust_target: aarch64-unknown-linux-gnu
            zigbuild: true
            artifact: fleet-linux-arm64

          - name: macOS Universal
            runner: macos-latest
            rust_target: universal-apple-darwin
            artifact: fleet-macos

          - name: Windows x64
            runner: windows-latest
            rust_target: x86_64-pc-windows-msvc
            artifact: fleet-windows-x64

    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set version from tag
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          for toml in claw-fleet-core/Cargo.toml claw-fleet-desktop/Cargo.toml fleet-cli/Cargo.toml; do
            sed -i.bak "s/^version = \".*\"/version = \"${VERSION}\"/" "$toml"
            rm -f "${toml}.bak"
          done

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            libglib2.0-dev \
            libgtk-3-dev \
            libssl-dev \
            libayatana-appindicator3-dev

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target == 'universal-apple-darwin' && 'aarch64-apple-darwin,x86_64-apple-darwin' || matrix.rust_target }}

      - name: Setup Zig
        if: matrix.zigbuild
        uses: goto-bus-stop/setup-zig@v2

      - name: Install cargo-zigbuild
        if: matrix.zigbuild
        run: cargo install cargo-zigbuild

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Build fleet-cli
        shell: bash
        run: |
          mkdir -p dist

          if [ "${{ matrix.rust_target }}" = "universal-apple-darwin" ]; then
            cargo build --release -p fleet-cli --target aarch64-apple-darwin
            cargo build --release -p fleet-cli --target x86_64-apple-darwin
            lipo -create \
              target/aarch64-apple-darwin/release/fleet-cli \
              target/x86_64-apple-darwin/release/fleet-cli \
              -output dist/${{ matrix.artifact }}
            chmod +x dist/${{ matrix.artifact }}

          elif [ "${{ matrix.zigbuild }}" = "true" ]; then
            cargo zigbuild --release -p fleet-cli --target ${{ matrix.rust_target }}.2.17
            cp target/${{ matrix.rust_target }}/release/fleet-cli dist/${{ matrix.artifact }}

          else
            cargo build --release -p fleet-cli --target ${{ matrix.rust_target }}
            EXT=""
            if [ "$RUNNER_OS" = "Windows" ]; then EXT=".exe"; fi
            cp "target/${{ matrix.rust_target }}/release/fleet-cli${EXT}" \
               "dist/${{ matrix.artifact }}${EXT}"
          fi

      - name: Upload CLI artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/
          if-no-files-found: error

  # ═══════════════════════════════════════════════════════════════════════════
  # Step 2 — Build desktop apps (bundles CLI from step 1)
  # ═══════════════════════════════════════════════════════════════════════════
  desktop-build:
    needs: cli-build
    name: Desktop — ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS (Universal)
            runner: macos-latest
            rust_target: universal-apple-darwin
            tauri_args: --target universal-apple-darwin --features vendored-ssl
            sidecar_artifact: fleet-macos
            sidecar_name: fleet-universal-apple-darwin
            fixed_suffix: macos

          - name: Windows (x64)
            runner: windows-latest
            rust_target: x86_64-pc-windows-msvc
            tauri_args: --target x86_64-pc-windows-msvc
            sidecar_artifact: fleet-windows-x64
            sidecar_name: fleet-x86_64-pc-windows-msvc.exe
            fixed_suffix: windows-x64

          - name: Linux (x86_64)
            runner: ubuntu-22.04
            rust_target: x86_64-unknown-linux-gnu
            tauri_args: --target x86_64-unknown-linux-gnu
            sidecar_artifact: fleet-linux-x64
            sidecar_name: fleet-x86_64-unknown-linux-gnu
            fixed_suffix: linux-x64

    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set version from tag
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          for toml in claw-fleet-core/Cargo.toml claw-fleet-desktop/Cargo.toml fleet-cli/Cargo.toml; do
            sed -i.bak "s/^version = \".*\"/version = \"${VERSION}\"/" "$toml"
            rm -f "${toml}.bak"
          done

      # ── Download CLI artifacts from step 1 ────────────────────────────────

      - name: Download sidecar CLI
        uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.sidecar_artifact }}
          path: claw-fleet-desktop/binaries

      - name: Download Linux x64 probe
        uses: actions/download-artifact@v4
        with:
          name: fleet-linux-x64
          path: claw-fleet-desktop/resources

      - name: Download Linux arm64 probe
        uses: actions/download-artifact@v4
        with:
          name: fleet-linux-arm64
          path: claw-fleet-desktop/resources

      - name: Prepare sidecar and probes
        shell: bash
        run: |
          cd claw-fleet-desktop/binaries
          mv ${{ matrix.sidecar_artifact }}* ${{ matrix.sidecar_name }}
          chmod +x ${{ matrix.sidecar_name }} 2>/dev/null || true

          if [ "$RUNNER_OS" = "Linux" ]; then
            cp ${{ matrix.sidecar_name }} fleet-linux
          fi

          if [ "${{ matrix.rust_target }}" = "universal-apple-darwin" ]; then
            mkdir -p ../../target/universal-apple-darwin/release
            cp ${{ matrix.sidecar_name }} ../../target/universal-apple-darwin/release/fleet-cli
          fi

          cd ../resources
          chmod +x fleet-linux-x64 fleet-linux-arm64

      # ── Build desktop app ─────────────────────────────────────────────────

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: claw-fleet-desktop/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target == 'universal-apple-darwin' && 'aarch64-apple-darwin,x86_64-apple-darwin' || matrix.rust_target }}

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            patchelf \
            libglib2.0-dev \
            libgtk-3-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            libasound2-dev \
            xdg-utils

      - name: Import macOS signing certificates
        if: runner.os == 'macOS'
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PWD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
          MACOS_INSTALLER_CERTIFICATE: ${{ secrets.MACOS_INSTALLER_CERTIFICATE }}
          MACOS_INSTALLER_CERTIFICATE_PWD: ${{ secrets.MACOS_INSTALLER_CERTIFICATE_PWD }}
          MACOS_KEYCHAIN_PASSWORD: ${{ secrets.MACOS_KEYCHAIN_PASSWORD }}
        run: |
          if [ -z "$MACOS_CERTIFICATE" ]; then
            echo "MACOS_CERTIFICATE not set — skipping"
            exit 0
          fi
          echo "$MACOS_CERTIFICATE" | base64 --decode > certificate.p12
          security create-keychain -p "$MACOS_KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$MACOS_KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -lut 7200 build.keychain
          security import certificate.p12 -k build.keychain \
            -P "$MACOS_CERTIFICATE_PWD" -T /usr/bin/codesign -T /usr/bin/productbuild -T /usr/bin/pkgbuild
          rm certificate.p12
          if [ -n "$MACOS_INSTALLER_CERTIFICATE" ]; then
            echo "$MACOS_INSTALLER_CERTIFICATE" | base64 --decode > installer.p12
            security import installer.p12 -k build.keychain \
              -P "$MACOS_INSTALLER_CERTIFICATE_PWD" -T /usr/bin/codesign -T /usr/bin/productbuild -T /usr/bin/pkgbuild
            rm installer.p12
          fi
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign:,productbuild: -s -k "$MACOS_KEYCHAIN_PASSWORD" build.keychain

      - name: Install frontend dependencies
        run: npm ci
        working-directory: claw-fleet-desktop

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ''
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          OPENSSL_STATIC: '1'
        with:
          projectPath: claw-fleet-desktop
          args: ${{ matrix.tauri_args }}
          includeUpdaterJson: false

      # ── Re-sign and build PKG (macOS) ─────────────────────────────────────

      - name: Re-sign and repackage (macOS)
        if: runner.os == 'macOS'
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_INSTALLER_IDENTITY: ${{ secrets.APPLE_INSTALLER_IDENTITY }}
        shell: bash
        run: |
          APP="target/${{ matrix.rust_target }}/release/bundle/macos/Claw Fleet.app"
          VERSION="${GITHUB_REF_NAME#v}"

          if [ -n "$APPLE_SIGNING_IDENTITY" ]; then
            echo "Signing sidecar (fleet CLI) with non-sandbox entitlements..."
            codesign --force --sign "$APPLE_SIGNING_IDENTITY" \
              --entitlements claw-fleet-desktop/entitlements-sidecar.plist \
              --options runtime \
              "$APP/Contents/MacOS/fleet"
            echo "Signing app bundle with sandbox entitlements..."
            codesign --force --sign "$APPLE_SIGNING_IDENTITY" \
              --entitlements claw-fleet-desktop/entitlements.plist \
              --options runtime \
              "$APP"
          fi

          PKG_DIR="target/${{ matrix.rust_target }}/release/bundle/pkg"
          mkdir -p "$PKG_DIR"
          PKG_SIGN_ARGS=()
          if [ -n "${APPLE_INSTALLER_IDENTITY:-}" ]; then
            PKG_SIGN_ARGS=(--sign "$APPLE_INSTALLER_IDENTITY")
          fi
          pkgbuild --component "$APP" \
            --identifier "com.hoveychen.claw-fleet" \
            --version "$VERSION" \
            --install-location "/Applications" \
            "${PKG_SIGN_ARGS[@]}" \
            "$PKG_DIR/claw-fleet-${{ matrix.fixed_suffix }}.pkg"

      # ── Collect artifacts ─────────────────────────────────────────────────

      - name: Collect artifacts (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          mkdir -p dist-artifacts
          cp target/${{ matrix.rust_target }}/release/bundle/pkg/claw-fleet-${{ matrix.fixed_suffix }}.pkg \
             dist-artifacts/

      - name: Collect artifacts (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          mkdir -p dist-artifacts
          find target/${{ matrix.rust_target }}/release/bundle/nsis \
            -name "*.exe" | head -1 | xargs -I{} cp {} dist-artifacts/claw-fleet-${{ matrix.fixed_suffix }}-setup.exe

      - name: Collect artifacts (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          mkdir -p dist-artifacts
          find target/${{ matrix.rust_target }}/release/bundle/deb \
            -name "*.deb" | head -1 | xargs -I{} cp {} dist-artifacts/claw-fleet-${{ matrix.fixed_suffix }}.deb 2>/dev/null || true
          find target/${{ matrix.rust_target }}/release/bundle/appimage \
            -name "*.AppImage" | head -1 | xargs -I{} cp {} dist-artifacts/claw-fleet-${{ matrix.fixed_suffix }}.AppImage 2>/dev/null || true

      - name: Upload desktop artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.rust_target }}
          path: dist-artifacts/
          if-no-files-found: error

  # ═══════════════════════════════════════════════════════════════════════════
  # Publish release with all artifacts
  # ═══════════════════════════════════════════════════════════════════════════
  publish:
    name: Publish Release
    needs: [cli-build, desktop-build]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: '{fleet-*,desktop-*}'
          path: all-artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -lh all-artifacts/

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Find latest mobile release
        id: mobile
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          MOBILE_TAG=$(gh release list -L 50 --json tagName -q '[.[] | select(.tagName | startswith("mobile-v"))][0].tagName' 2>/dev/null || echo "")
          if [ -n "$MOBILE_TAG" ]; then
            ASSET_URL=$(gh release view "$MOBILE_TAG" --json assets -q '.assets[0].url' 2>/dev/null || echo "")
            echo "tag=$MOBILE_TAG" >> "$GITHUB_OUTPUT"
            echo "url=$ASSET_URL" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate release notes
        run: |
          DL="https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}"
          cat >> release_notes.md << EOF
          ## Downloads

          ### App Installers

          | | Platform | Architecture | Download |
          |---|---|---|---|
          | <img src="https://raw.githubusercontent.com/hoveychen/claw-fleet/main/docs/icon-apple.svg" width="24"> | macOS | Universal (Intel + Apple Silicon) | [claw-fleet-macos.pkg](${DL}/claw-fleet-macos.pkg) |
          | <img src="https://raw.githubusercontent.com/hoveychen/claw-fleet/main/docs/icon-windows.svg" width="24"> | Windows | x64 / ARM64 | [claw-fleet-windows-x64-setup.exe](${DL}/claw-fleet-windows-x64-setup.exe) |
          | <img src="https://raw.githubusercontent.com/hoveychen/claw-fleet/main/docs/icon-linux.svg" width="24"> | Linux | x86_64 | [claw-fleet-linux-x64.deb](${DL}/claw-fleet-linux-x64.deb) / [claw-fleet-linux-x64.AppImage](${DL}/claw-fleet-linux-x64.AppImage) |

          ### Standalone CLI

          | | Platform | Download |
          |---|---|---|
          | <img src="https://raw.githubusercontent.com/hoveychen/claw-fleet/main/docs/icon-apple.svg" width="24"> | macOS (Universal) | [fleet-macos](${DL}/fleet-macos) |
          | <img src="https://raw.githubusercontent.com/hoveychen/claw-fleet/main/docs/icon-windows.svg" width="24"> | Windows x64 | [fleet-windows-x64.exe](${DL}/fleet-windows-x64.exe) |
          | <img src="https://raw.githubusercontent.com/hoveychen/claw-fleet/main/docs/icon-linux.svg" width="24"> | Linux x86_64 | [fleet-linux-x64](${DL}/fleet-linux-x64) |
          | <img src="https://raw.githubusercontent.com/hoveychen/claw-fleet/main/docs/icon-linux.svg" width="24"> | Linux ARM64 | [fleet-linux-arm64](${DL}/fleet-linux-arm64) |

          ### Mobile Companion

          | | Platform | Download |
          |---|---|---|
          | <img src="https://raw.githubusercontent.com/hoveychen/claw-fleet/main/docs/icon-android.svg" width="24"> | Android | [Download APK](${{ steps.mobile.outputs.url }}) |

          Scan the QR code in Desktop → Settings → Mobile to connect.

          ## What's Changed

          See [CHANGELOG](https://github.com/${{ github.repository }}/commits/${{ github.ref_name }}) for full commit history.
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Claw Fleet v${{ steps.version.outputs.version }}
          body_path: release_notes.md
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: all-artifacts/*
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
